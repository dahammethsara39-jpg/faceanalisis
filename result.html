<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Your Aura — Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #c9a84c; --gold-lt: #e8c97a; --bg: #080808;
    --border: rgba(201,168,76,0.18); --text: #f0ede8; --muted: #666;
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.35;
  }
  .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 52px 20px 80px; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 300; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 56px; }
  .result-card { width: 100%; max-width: 520px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 2px; padding: 48px 44px; backdrop-filter: blur(16px); opacity: 0; transform: translateY(20px); animation: fadeUp 0.7s ease 0.1s forwards; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .top-section { display: flex; gap: 36px; align-items: center; margin-bottom: 48px; }
  .photo-wrap { position: relative; flex-shrink: 0; width: 130px; height: 130px; }
  .photo-ring { position: absolute; inset: -4px; border-radius: 50%; background: conic-gradient(from 0deg, transparent 0deg, var(--gold) 60deg, var(--gold-lt) 120deg, transparent 180deg, var(--gold) 240deg, var(--gold-lt) 300deg, transparent 360deg); opacity: 0; animation: rotatering 4s linear infinite, ringFadeIn 1.2s ease 0.6s forwards; }
  @keyframes rotatering { to { transform: rotate(360deg); } }
  @keyframes ringFadeIn { to { opacity: 1; } }
  .photo-glow { position: absolute; inset: -18px; border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.22) 0%, transparent 70%); animation: pulseGlow 2.5s ease-in-out infinite, glowFadeIn 1s ease 1s forwards; opacity: 0; }
  @keyframes pulseGlow { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.12);opacity:1} }
  @keyframes glowFadeIn { to { opacity: 1; } }
  .photo-mask { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; border: 3px solid var(--bg); z-index: 1; }
  .photo-mask img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .score-section { flex: 1; }
  .score-number { font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 300; line-height: 1; color: var(--gold); }
  .score-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin: 6px 0 12px; }
  .tier-name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; font-style: italic; }
  .divider { height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); margin-bottom: 36px; }
  .metrics-title { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }
  .metric-row { margin-bottom: 22px; opacity: 0; transform: translateX(-10px); }
  .metric-row:nth-child(1){animation:slideIn .5s ease .8s forwards}
  .metric-row:nth-child(2){animation:slideIn .5s ease 1.0s forwards}
  .metric-row:nth-child(3){animation:slideIn .5s ease 1.2s forwards}
  .metric-row:nth-child(4){animation:slideIn .5s ease 1.4s forwards}
  @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
  .metric-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .metric-name { font-size: 0.82rem; color: rgba(240,237,232,0.7); }
  .metric-pct { font-size: 0.82rem; color: var(--gold); }
  .bar-track { height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden; }
  .bar-fill { height: 100%; width: 0%; border-radius: 1px; background: linear-gradient(to right, var(--gold), var(--gold-lt)); transition: width 1.2s cubic-bezier(0.22,1,0.36,1); }

  /* ── AI Reading Section ── */
  .ai-section {
    margin-top: 36px;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px 28px;
    background: rgba(201,168,76,0.03);
    opacity: 0;
    animation: fadeUp 0.6s ease 1.8s forwards;
  }
  .ai-label {
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .ai-reading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    line-height: 1.7;
    color: rgba(240,237,232,0.85);
    margin-bottom: 18px;
  }
  .ai-tips-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .ai-tips {
    font-size: 0.83rem;
    line-height: 1.8;
    color: rgba(240,237,232,0.65);
  }
  .ai-tips span {
    display: block;
    padding-left: 14px;
    position: relative;
  }
  .ai-tips span::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--gold);
  }

  /* Loading shimmer for AI text */
  .ai-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
  }
  .ai-spinner {
    width: 14px; height: 14px;
    border: 1px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .actions { display: flex; gap: 12px; margin-top: 32px; }
  .btn { flex: 1; padding: 14px; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-align: center; }
  .btn-primary { background: var(--gold); color: #080808; border: none; font-weight: 500; }
  .btn-primary:hover { background: var(--gold-lt); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.08); text-decoration: none; }
  .btn-ghost:hover { border-color: var(--border); color: var(--text); }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(201,168,76,0.15); border: 1px solid var(--border); padding: 10px 24px; border-radius: 2px; font-size: 0.78rem; color: var(--gold); opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media(max-width:520px){ .result-card{padding:32px 24px} .top-section{flex-direction:column;gap:28px} .score-number{font-size:4rem} .photo-wrap{width:110px;height:110px} }
</style>
</head>
<body>
<div class="page">
  <div class="logo">✦ Aura Check</div>
  <div class="result-card">
    <div class="top-section">
      <div class="photo-wrap">
        <div class="photo-glow"></div>
        <div class="photo-ring"></div>
        <div class="photo-mask"><img id="result-photo" src="" alt="Your photo"/></div>
      </div>
      <div class="score-section">
        <div class="score-number" id="score-number">0</div>
        <div class="score-label">Aura Score</div>
        <div class="tier-name" id="tier-name">—</div>
        <div id="tier-icon" style="font-size:1.2rem;margin-top:4px"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="metrics-title">Breakdown</div>
    <div id="metrics-list"></div>

    <!-- AI Reading Section -->
    <div class="ai-section">
      <div class="ai-label">✦ Honest Aura Reading</div>
      <div id="ai-content">
        <div class="ai-loading">
          <div class="ai-spinner"></div>
          Reading your aura...
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="share-btn">Share Result</button>
      <a href="/" class="btn btn-ghost">Try Again</a>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const data  = JSON.parse(sessionStorage.getItem('aura_result') || 'null');
const photo = sessionStorage.getItem('aura_photo');
if (!data) window.location.href = '/';

// Photo
const photoEl = document.getElementById('result-photo');
if (photo) photoEl.src = photo;

// Score count-up
const scoreEl = document.getElementById('score-number');
const target  = data.total;
const start   = performance.now();
function animateScore(ts) {
  const prog = Math.min((ts - start) / 1800, 1);
  const e    = 1 - Math.pow(1 - prog, 3);
  scoreEl.textContent = Math.round(e * target);
  if (prog < 1) requestAnimationFrame(animateScore);
  else {
    scoreEl.textContent = target;
    document.getElementById('tier-name').textContent = data.tier;
    document.getElementById('tier-icon').textContent = data.icon;
  }
}
setTimeout(() => requestAnimationFrame(animateScore), 500);

// Metrics
const metricsList = document.getElementById('metrics-list');
Object.entries(data.metrics).forEach(([name, score], i) => {
  const pct = Math.round(score);
  const row = document.createElement('div');
  row.className = 'metric-row';
  row.innerHTML = `
    <div class="metric-header">
      <span class="metric-name">${name}</span>
      <span class="metric-pct" id="pct-${i}">0%</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-${i}"></div></div>`;
  metricsList.appendChild(row);
  setTimeout(() => {
    document.getElementById(`bar-${i}`).style.width = pct + '%';
    const t = performance.now();
    const el = document.getElementById(`pct-${i}`);
    function animPct(ts) {
      const p = Math.min((ts-t)/1000,1);
      el.textContent = Math.round((1-Math.pow(1-p,3))*pct)+'%';
      if(p<1) requestAnimationFrame(animPct);
      else el.textContent = pct+'%';
    }
    requestAnimationFrame(animPct);
  }, 800 + i * 200 + 400);
});

// AI Reading — show from data already returned by /analyze
const aiContent = document.getElementById('ai-content');
function showAIReading() {
  const reading = data.reading || '';
  const tips    = data.tips    || '';

  if (!reading) {
    aiContent.innerHTML = `<div class="ai-reading">Your aura reflects a unique combination of features measured across symmetry, glow, eye intensity and jawline definition.</div>`;
    return;
  }

  // Parse tips into bullet points
  const tipLines = tips.split(/[.\n]/).map(t => t.trim()).filter(t => t.length > 10);

  aiContent.innerHTML = `
    <div class="ai-reading">${reading}</div>
    ${tipLines.length ? `
    <div class="ai-tips-label">How to improve</div>
    <div class="ai-tips">
      ${tipLines.map(t => `<span>${t}</span>`).join('')}
    </div>` : ''}
  `;
}

// Show AI reading after score animation
setTimeout(showAIReading, 2000);

// Share
document.getElementById('share-btn').addEventListener('click', () => {
  const text = `✦ My Aura Score: ${data.total}/100 — ${data.tier} ${data.icon}\n` +
    Object.entries(data.metrics).map(([k,v]) => `${k}: ${Math.round(v)}%`).join(' · ') +
    '\n\nCheck yours → faceanalisis.onrender.com';
  if (navigator.share) navigator.share({title:'My Aura',text}).catch(()=>{});
  else navigator.clipboard.writeText(text).then(() => showToast('Copied ✦'));
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
