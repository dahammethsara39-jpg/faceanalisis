<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aura Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:    #c9a84c;
    --gold-lt: #e8c97a;
    --bg:      #080808;
    --bg2:     #111111;
    --border:  rgba(201,168,76,0.18);
    --text:    #f0ede8;
    --muted:   #888;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ── Noise grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.35;
  }

  /* ── Ambient glow ── */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* ── Logo / wordmark ── */
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 64px;
  }

  /* ── Main card ── */
  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 52px 44px;
    backdrop-filter: blur(12px);
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .card-sub {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 40px;
  }

  /* ── Drop zone ── */
  #drop-zone {
    border: 1px dashed rgba(201,168,76,0.3);
    border-radius: 2px;
    padding: 52px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s;
    position: relative;
  }

  #drop-zone:hover,
  #drop-zone.drag-over {
    border-color: var(--gold);
    background: rgba(201,168,76,0.04);
  }

  #drop-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }

  .drop-icon {
    width: 40px; height: 40px;
    margin: 0 auto 16px;
    opacity: 0.5;
  }

  .drop-text {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.7;
  }

  .drop-text strong {
    display: block;
    color: var(--text);
    font-weight: 400;
    margin-bottom: 4px;
    font-size: 0.95rem;
  }

  /* ── Preview ── */
  #preview-wrap {
    display: none;
    margin-top: 20px;
    position: relative;
  }

  #preview-img {
    width: 100%;
    max-height: 260px;
    object-fit: cover;
    border-radius: 2px;
    display: block;
  }

  #remove-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.75rem;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.06em;
  }

  /* ── Analyze button ── */
  #analyze-btn {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: var(--gold);
    color: #080808;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.15s;
    display: none;
  }

  #analyze-btn:hover { background: var(--gold-lt); }
  #analyze-btn:active { transform: scale(0.98); }
  #analyze-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── Loading state ── */
  #loading {
    display: none;
    text-align: center;
    padding: 32px 0 0;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 1.5px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── Error ── */
  #error-msg {
    display: none;
    margin-top: 16px;
    padding: 12px 16px;
    border: 1px solid rgba(255,80,80,0.3);
    background: rgba(255,80,80,0.05);
    border-radius: 2px;
    font-size: 0.82rem;
    color: #ff8080;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 48px;
    font-size: 0.72rem;
    color: rgba(136,136,136,0.5);
    letter-spacing: 0.08em;
    text-align: center;
  }

  @media (max-width: 520px) {
    .card { padding: 36px 28px; }
    .card-title { font-size: 1.9rem; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="logo">✦ Aura Check</div>

  <div class="card">
    <h1 class="card-title">Read your<br>aura.</h1>
    <p class="card-sub">Upload a clear, front-facing photo. Results in seconds.</p>

    <!-- Drop zone -->
    <div id="drop-zone">
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp"/>
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="3" width="18" height="18" rx="1"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <div class="drop-text">
        <strong>Drop your photo here</strong>
        or click to browse — JPG, PNG, WEBP
      </div>
    </div>

    <!-- Image preview -->
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="Preview"/>
      <button id="remove-btn">✕ Remove</button>
    </div>

    <!-- Analyze button -->
    <button id="analyze-btn">Reveal my aura</button>

    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Analysing...</div>
    </div>

    <!-- Error -->
    <div id="error-msg"></div>
  </div>

  <div class="footer">Runs locally · No data stored · 100% free</div>
</div>

<script>
const dropZone    = document.getElementById('drop-zone');
const fileInput   = document.getElementById('file-input');
const previewWrap = document.getElementById('preview-wrap');
const previewImg  = document.getElementById('preview-img');
const removeBtn   = document.getElementById('remove-btn');
const analyzeBtn  = document.getElementById('analyze-btn');
const loading     = document.getElementById('loading');
const errorMsg    = document.getElementById('error-msg');

let selectedFile = null;

// ── Drag & drop ──────────────────────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) loadFile(f);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadFile(fileInput.files[0]);
});

function loadFile(file) {
  selectedFile = file;
  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewWrap.style.display = 'block';
  analyzeBtn.style.display  = 'block';
  dropZone.style.display    = 'none';
  hideError();
}

removeBtn.addEventListener('click', () => {
  selectedFile = null;
  previewWrap.style.display = 'none';
  analyzeBtn.style.display  = 'none';
  dropZone.style.display    = 'block';
  fileInput.value = '';
  hideError();
});

// ── Submit ────────────────────────────────────────────────────────────────────
analyzeBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  // Store image as base64 for result page
  const reader = new FileReader();
  reader.onload = async (e) => {
    sessionStorage.setItem('aura_photo', e.target.result);
  };
  reader.readAsDataURL(selectedFile);

  analyzeBtn.disabled    = true;
  loading.style.display  = 'block';
  hideError();

  const formData = new FormData();
  formData.append('image', selectedFile);

  try {
    const res  = await fetch('/analyze', { method: 'POST', body: formData });
    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    // Pass result to result page via sessionStorage
    sessionStorage.setItem('aura_result', JSON.stringify(data));
    window.location.href = '/result';

  } catch (err) {
    showError('Could not connect to the server. Is the backend running?');
  } finally {
    analyzeBtn.disabled   = false;
    loading.style.display = 'none';
  }
});

function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
function hideError()     { errorMsg.style.display = 'none'; }
</script>
</body>
</html>
